# ============================================================
# GENERIC APPLICATION PROPERTIES
# Activate a profile: mysql or postgresql
# ============================================================
spring.profiles.active=postgresql
# Server
server.port=8080

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# IMPORTANT: Change the secret in production!
# ============================================================
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!ChangeThisInProduction
app.jwt.expiration-ms=86400000

# ============================================================
# CORS – Allowed origins (comma-separated)
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://localhost:5173,http://127.0.0.1:5500

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.exam.template=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
