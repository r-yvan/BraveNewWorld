version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: starter-postgres
    environment:
      POSTGRES_DB: starter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - starter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starter-app
    environment:
      SPRING_PROFILE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/starter_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - starter-network

volumes:
  postgres_data:

networks:
  starter-network:
    driver: bridge
