spring:
  jpa:
    show-sql: false
  
  flyway:
    enabled: true

logging:
  level:
    root: WARN
    com.starter: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/application.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
